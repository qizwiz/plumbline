\* TLC config for MissingAwait — authored for CA_SVM goal compliance
\* (added to make this the 9th spec in the mutation experiment).
\*
\* Original spec is verified correct (NoFalsePositive holds by design).
\* So baseline TLC produces NO counterexample. Mutations that introduce
\* a bug — making consumed sites appear in violations — classify as novel.

SPECIFICATION Spec

CONSTANTS
    Sites         = {s1, s2, s3}
    ConsumedSites = {s1}
    AwaitableSites = {s2}

INVARIANTS
    TypeInvariant
    NoFalsePositive

PROPERTIES
    MonotonicViolations
