\* TLC model config for CumulativeStateDrift.tla
\* See module header for context. Run with:
\*   cd docs/tla
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config CumulativeStateDrift.cfg -deadlock CumulativeStateDrift
\*
\* Smallest model exhibiting the bug:
\*   MaxPerPeriod=3, MaxCalls=2.
\*   Two BuggyPermit(2) calls each pass the stale-base guard (0+2<=3),
\*   but cumulative=4 > 3, violating CumulativeLimitHolds.

SPECIFICATION Spec

CONSTANTS
    MaxPerPeriod = 3
    MaxCalls     = 2

INVARIANTS
    TypeInvariant
    CheckBaseNeverExceedsLimit
    CheckBaseNeverExceedsCumulative
    CumulativeLimitHolds
