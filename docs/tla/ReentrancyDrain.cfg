\* TLC model config for ReentrancyDrain.tla
\* See module header for context. Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config ReentrancyDrain.cfg -deadlock ReentrancyDrain
\*
\* Pact convention: plural INVARIANTS / PROPERTIES.
\* MaxReentries=3 lets TLC see 3 nested re-entries (one PreCheck + 2
\* Reenter) before PostClear, giving paid[e1] = 3*TicketPrice = 30 in
\* the counterexample. MaxReentries=2 also exhibits the bug (paid = 20).

SPECIFICATION Spec

CONSTANTS
    Entries      = {e1}
    TicketPrice  = 10
    MaxReentries = 3

INVARIANTS
    TypeInvariant
    ClaimedAtMostOnce

PROPERTIES
    MonotonicPaid
    SlotProgresses
