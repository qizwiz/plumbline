\* TLC model config for OracleStaleness.tla
\* Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config OracleStaleness.cfg -deadlock OracleStaleness
\*
\* MaxAge = 3, FRESHNESS = 1: oracle stales after 1 Tick.
\* Counterexample trace: Tick; Tick; PayBuggy(a1)
\*   oracle_age = 2 > FRESHNESS = 1  →  StaleDataRejected violated.

SPECIFICATION Spec

CONSTANTS
    Agents    = {a1}
    MaxAge    = 3
    FRESHNESS = 1

INVARIANTS
    TypeInvariant
    StaleDataRejected
