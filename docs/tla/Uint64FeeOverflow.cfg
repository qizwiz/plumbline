\* TLC model config for Uint64FeeOverflow.tla
\* See module header for context. Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config Uint64FeeOverflow.cfg -deadlock Uint64FeeOverflow
\*
\* Pact convention: plural INVARIANTS / PROPERTIES.
\* Concrete numbers chosen so the bug fires QUICKLY (state 3 wraps):
\*   MaxValue=10 (toy uint4-ish), FeePerRaffle=4, MaxRaffles=5
\*   tracked: 0 → 4 → 8 → 2 (WRAP — actual=12, tracked=2, diverged)
\* Real puppy-raffle: MaxValue=2**64, FeePerRaffle in wei. Same shape,
\* just larger numbers; this toy model captures the bug structure.

SPECIFICATION Spec

CONSTANTS
    FeePerRaffle = 4
    MaxValue     = 10
    MaxRaffles   = 5

INVARIANTS
    TypeInvariant
    TrackedMatchesActual

PROPERTIES
    ActualMonotonic
    TrackedMonotonic
