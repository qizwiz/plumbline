\* TLC config for Orchestration.tla — the bounded-retry-then-escalate dispatch model.
\* Run from docs/tla/:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config Orchestration.cfg -deadlock Orchestration
\*
\* 3 specialist agents, up to 2 findings each, retry cap = 2 (= MAX_VERIFY_ATTEMPTS).
\* Expected: all properties HOLD — the dispatch is live, complete, starvation-free, and
\* never retries past the cap.

SPECIFICATION Spec

CONSTANTS
    Agents = {solvency, precision, access}
    MaxFindings = 2
    MaxAttempts = 2

INVARIANTS
    TypeOK
    GateIsSingleOwner
    RetriesCapped

PROPERTIES
    Liveness
    Completion
    NoStarvation
