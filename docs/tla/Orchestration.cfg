\* TLC model config for Orchestration.tla — the multi-agent fairness/liveness model.
\* Run from docs/tla/:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config Orchestration.cfg -deadlock Orchestration
\*
\* 3 specialist agents, up to 2 findings each. Expected: all properties HOLD
\* (the orchestration is live + fair under weak-fairness scheduling).

SPECIFICATION Spec

CONSTANTS
    Agents = {solvency, precision, access}
    MaxFindings = 2

INVARIANTS
    TypeOK
    GateIsSingleOwner

PROPERTIES
    Liveness
    Completion
    NoStarvation
