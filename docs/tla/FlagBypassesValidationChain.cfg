\* TLC model config for FlagBypassesValidationChain.tla
\* Smallest model that fires the bug:
\*   1 sig, 1 wallet, MaxSteps=2. Bug: AcceptBuggy(s=1, w=1, bypass=TRUE)
\*   sets accepted[1][1]=TRUE but enforced[1][1]=FALSE.
\*   EnforcementHonored violated at state 2.

SPECIFICATION Spec

CONSTANTS
    NumSigs    = 1
    NumWallets = 1
    MaxSteps   = 2

INVARIANTS
    TypeInvariant
    StepCountBounded
    EnforcementHonored

PROPERTIES
    AcceptanceMonotonic
