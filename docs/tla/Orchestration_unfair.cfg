\* TLC config that DROPS the escalate-after-cap fallback (NoCapSpec) — i.e. an uncapped retry that
\* never gives up. This proves the cap fallback is LOAD-BEARING, not decorative: a persistently-
\* failing verifier then leaves a finding pending forever, so TLC reports Liveness VIOLATED with a
\* counterexample. The shipped code (orchestrator.py: _verify_with_retry + escalate) is the version
\* that has the fallback. Run from docs/tla/:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config Orchestration_unfair.cfg -deadlock Orchestration

SPECIFICATION NoCapSpec

CONSTANTS
    Agents = {solvency, precision, access}
    MaxFindings = 1
    MaxAttempts = 2

PROPERTIES
    Liveness
