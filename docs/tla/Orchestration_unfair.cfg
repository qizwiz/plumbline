\* TLC config that DROPS the dispatcher's weak fairness (UnfairSpec). This proves
\* the fairness assumption is load-bearing, not vacuous: TLC reports Liveness
\* VIOLATED with a counterexample where a proposed finding is never resolved
\* (the dispatcher starves it). Run from docs/tla/:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config Orchestration_unfair.cfg -deadlock Orchestration

SPECIFICATION UnfairSpec

CONSTANTS
    Agents = {solvency, precision, access}
    MaxFindings = 1

PROPERTIES
    Liveness
