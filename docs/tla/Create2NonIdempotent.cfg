\* TLC model config for Create2NonIdempotent.tla
\* See module header for context. Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config Create2NonIdempotent.cfg -deadlock Create2NonIdempotent
\*
\* Pact convention: plural INVARIANTS / PROPERTIES.
\* Salts = {s1, s2} is enough to surface the bug on either salt; the
\* counterexample uses one salt called twice (Deployed then Reverted).

SPECIFICATION Spec

CONSTANTS
    Salts            = {s1}
    MaxCallsPerSalt  = 3

INVARIANTS
    TypeInvariant
    DeployedNeverReverts

PROPERTIES
    DeploymentMonotonic
    CallCountMonotonic
