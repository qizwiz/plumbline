\* TLC model config for CrossWalletSigReplay.tla
\* See module header for context. Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config CrossWalletSigReplay.cfg -deadlock CrossWalletSigReplay
\*
\* Smallest model that exhibits the bug:
\*   2 wallets sharing a session signer; 2 sigs (one per wallet).
\*   Bug: AcceptBuggy(s=1, w=2) executes signature 1 on wallet 2,
\*   violating WalletIdentityBound since SignedForWallet(1) = 1 # 2.

SPECIFICATION Spec

CONSTANTS
    NumWallets = 2
    NumSigs    = 2
    MaxExecs   = 2

INVARIANTS
    TypeInvariant
    ExecCountConsistent
    WalletIdentityBound

PROPERTIES
    ExecutionMonotonic
