\* TLC model config for ERC4337StaticSigDoS.tla
\* See module header for context. Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config ERC4337StaticSigDoS.cfg -deadlock ERC4337StaticSigDoS
\*
\* Pact convention (per MutableDefaultArg.cfg, SignatureReplay.cfg):
\* plural INVARIANTS / PROPERTIES. Scalar constants only (.cfg grammar
\* is more restrictive than .tla — no function literals).
