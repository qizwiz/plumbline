\* TLC model config for ERC4337StaticSigDoS.tla
\* See module header for context. Run with:
\*   java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -config ERC4337StaticSigDoS.cfg -deadlock ERC4337StaticSigDoS
\*
\* Pact convention (per MutableDefaultArg.cfg, SignatureReplay.cfg):
\* plural INVARIANTS / PROPERTIES. Scalar constants only (.cfg grammar
\* is more restrictive than .tla — no function literals).
\*
\* EntryPoint and User are modeled as scalar identities; the ASSUME
\* EntryPoint # User in the module is what makes this bug shape distinct
\* from SignatureReplay.
\*
\* PathChoice gates SubmitBuggy to fire only on the selected path.
\* Default: ViaEntryPoint (the bug-triggering path, preserves regression).
\* cfg_decode sets this based on lead vocabulary: M-02-like leads →
\* ViaEntryPoint; unrelated leads → Direct (no bug discharge).

SPECIFICATION Spec

CONSTANTS
    Calls      = {c1, c2}
    EntryPoint = ep
    User       = u
    PathChoice = ViaEntryPoint

INVARIANTS
    TypeInvariant
    NoBothOutcomes
    Authorized4337CallsExecute

PROPERTIES
    MonotonicOutcomes
