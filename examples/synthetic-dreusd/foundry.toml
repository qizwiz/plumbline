[profile.default]
src = "."
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
remappings = [
    "solmate/=lib/solmate/src/",
    "forge-std/=lib/forge-std/src/",
]

# Halmos config — symbolic execution settings for `check_*` invariants.
[profile.default.halmos]
function = "check"
loop = 5
solver-timeout-assertion = 120000
