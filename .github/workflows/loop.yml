name: rep-loop

# Runs the bilayer Layer 1 loop on every push to main: scoreboard, validator,
# and (if PACT_LLM_API_KEY is set as a repo secret) one sol_intent rep per
# curated corpus. If the secret is absent, the model-rep stage is SKIPPED
# (not failed) — the deterministic half still runs.
#
# Honest cost note: each sol_intent rep is one paid LLM call (~$0.05–$0.50
# depending on contract size). With 3 corpora and 1 rep per corpus per push,
# expect ~$1/push. Set the secret only when you want the auto-rep on; unset
# it to keep CI cheap.

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'sol_match.py'
      - 'sol_intent.py'
      - 'rep_log.py'
      - 'model_rep.py'
      - 'reps.jsonl'
      - '.github/workflows/loop.yml'
  workflow_dispatch:
    inputs:
      run_reps:
        description: 'Run sol_intent reps on the curated corpora'
        required: false
        default: 'true'

jobs:
  scoreboard:
    name: scoreboard + validator (deterministic, free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt fastembed numpy
      - run: python tools/validate_reps.py
      - run: python scoreboard.py

  reps:
    name: sol_intent reps (paid, gated on PACT_LLM_API_KEY)
    runs-on: ubuntu-latest
    needs: scoreboard
    # Only run when the secret exists AND either manual-dispatch with
    # run_reps=true or push to main that touched a corpus.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: pip install -r requirements.txt fastembed numpy scikit-learn
      - name: gate on secret
        id: gate
        env:
          KEY: ${{ secrets.PACT_LLM_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PACT_LLM_API_KEY not set — skipping reps stage (deterministic stage already ran)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: run reps on curated corpora (--recall mode for novel-code coverage)
        if: steps.gate.outputs.skip != 'true'
        env:
          PACT_LLM_API_KEY: ${{ secrets.PACT_LLM_API_KEY }}
          PACT_LLM_BASE_URL: ${{ secrets.PACT_LLM_BASE_URL }}
          PACT_LLM_MODEL: ${{ secrets.PACT_LLM_MODEL }}
        run: |
          set -e
          # --recall mode: tonight's finding was that intent-mode exhausts the
          # output budget on Promises and never emits Violations on large corpora
          # (sequence, 50 files). --recall uses prompts/sol_find.md (8 lenses,
          # short bullets) which scales.
          for ex in examples/puppy-raffle examples/t-swap examples/thunder-loan examples/boss-bridge examples/sequence; do
            if [ -f "$ex/.ANSWERS.md" ]; then
              python model_rep.py --recall "$ex" || true
            fi
          done
          python tools/validate_reps.py
      - name: retrain classifier (no LLM, free)
        if: steps.gate.outputs.skip != 'true'
        run: |
          python tools/lead_classifier.py train || true
      - name: prompt_improve if weakest corpus recall < 0.50 (closes the gradient)
        if: steps.gate.outputs.skip != 'true'
        env:
          PACT_LLM_API_KEY: ${{ secrets.PACT_LLM_API_KEY }}
          PACT_LLM_BASE_URL: ${{ secrets.PACT_LLM_BASE_URL }}
          PACT_LLM_MODEL: ${{ secrets.PACT_LLM_MODEL }}
        run: |
          python - <<'EOF'
          import json, os, statistics, sys
          rows = [json.loads(l) for l in open("reps.jsonl") if l.strip()]
          recent = rows[-5:]  # the reps just appended this iteration
          per_corpus = {}
          for r in recent:
              c = os.path.basename(r.get("contract", {}).get("path", "").rstrip("/"))
              rec = r.get("score", {}).get("recall")
              if c and rec is not None:
                  per_corpus[c] = rec
          if not per_corpus:
              print("no scored reps in tail; skipping prompt_improve"); sys.exit(0)
          weakest = min(per_corpus.items(), key=lambda kv: kv[1])
          print(f"weakest corpus this iter: {weakest[0]} recall={weakest[1]:.2f}")
          THRESH = 0.50
          if weakest[1] >= THRESH:
              print(f"recall >= {THRESH}; no rewrite needed"); sys.exit(0)
          # Below threshold — fire prompt_improve.improve_if_weak. The LLM
          # rewrites prompts/sol_find.md given the transcript of misses.
          sys.path.insert(0, ".")
          import prompt_improve as pi
          import invariant_agent as agent
          transcript = (f"Corpus {weakest[0]}: grounded recall {weakest[1]:.2f} "
                        f"below threshold {THRESH}. The .ANSWERS.md at "
                        f"examples/{weakest[0]}/.ANSWERS.md lists the real "
                        f"findings the model missed; rewrite the prompt to "
                        f"surface this style of finding better.")
          improved = pi.improve_if_weak("sol_find", weakest[1], transcript,
                                        lambda p: agent._ask(p, 8000))
          print(f"prompt_improve rewrote prompts/sol_find.md: {improved}")
          EOF
      - name: mirror reps.jsonl + answer keys to HF dataset (durable backup)
        if: steps.gate.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Gated on HF_TOKEN secret. Without it, this is a no-op. With it,
          # every cloud-loop iteration pushes reps.jsonl to a private HF
          # dataset (qizwiz/plumbline-reps) — versioned, browseable, survives
          # local disk wipes. The .ANSWERS.md files go too, so the ground
          # truth is durably backed up alongside the measurements.
          if [ -n "$HF_TOKEN" ]; then
            pip -q install huggingface_hub
            python hf_mirror.py || true
            python -c "
          import os
          from huggingface_hub import HfApi, create_repo
          token = os.environ['HF_TOKEN']
          repo = 'qizwiz/plumbline-reps'
          create_repo(repo, repo_type='dataset', private=True, exist_ok=True, token=token)
          api = HfApi(token=token)
          for ex in ['puppy-raffle','t-swap','thunder-loan','boss-bridge','sequence']:
              p = f'examples/{ex}/.ANSWERS.md'
              if os.path.isfile(p):
                  api.upload_file(path_or_fileobj=p, path_in_repo=f'answers/{ex}.md',
                                  repo_id=repo, repo_type='dataset')
          print('mirrored reps + answer keys to', repo)
          " || true
          else
            echo "HF_TOKEN not set as Actions secret — skipping HF mirror"
          fi
      - name: commit new rows + classifier + maybe new prompt
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "plumbline-bot"
          git config user.email "bot@plumbline.local"
          git add reps.jsonl tools/lead_classifier.pkl prompts/sol_find.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            # If prompts/sol_find.md changed, prompt_improve fired; commit
            # message records it so the audit trail shows the gradient closing
            if git diff --cached --name-only | grep -q "prompts/sol_find.md"; then
              git commit -m "ci(loop): reps + classifier + PROMPT REWRITE (gradient closed)"
            else
              git commit -m "ci(loop): cloud-loop auto-append + classifier retrain"
            fi
            git push
          else
            echo "no changes to commit"
          fi
