name: sanity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-reps:
    name: validate reps.jsonl schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: schema validator
        run: python tools/validate_reps.py
      - name: scoreboard renders
        run: python scoreboard.py || true
