name: slither-baselines
# Per docs/research/CODESPACE_REMOTE_COMPUTE.md: run slither on all 5
# contest corpora using the Trail of Bits eth-security-toolbox CI image,
# which has Foundry + Slither + solc-select pre-installed. Closes the
# puppy-raffle T15 gap (compile chain we couldn't run locally).
#
# Manually fired via `gh workflow run slither.yml`. Uploads slither.txt
# per corpus as artifacts; JH inspects + optionally commits to overwrite
# the local versions in examples/<corpus>/slither.txt.

on:
  workflow_dispatch:

jobs:
  slither:
    runs-on: ubuntu-latest
    container: ghcr.io/trailofbits/eth-security-toolbox/ci:nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          - corpus: boss-bridge
            solc: 0.8.20
          - corpus: puppy-raffle
            solc: 0.7.6
          - corpus: sequence
            solc: 0.8.28
          - corpus: t-swap
            solc: 0.8.20
          - corpus: thunder-loan
            solc: 0.8.20
    steps:
      - uses: actions/checkout@v4

      - name: Pin solc to ${{ matrix.solc }}
        run: |
          solc-select install ${{ matrix.solc }}
          solc-select use ${{ matrix.solc }}
          solc --version

      - name: Install foundry deps for ${{ matrix.corpus }}
        run: |
          cd examples/${{ matrix.corpus }}
          # Each corpus's foundry.toml uses lib/{openzeppelin-contracts,forge-std}
          # which aren't checked in. Install matching OZ version per corpus's solc.
          # Initialize git so forge install --no-commit works.
          git init -q && git add -A && git -c user.email=ci@plumbline -c user.name=ci commit -qm init
          # Pick OZ version: 0.7.6 corpora need OZ 3.x; 0.8.x corpora differ
          case "${{ matrix.corpus }}" in
            puppy-raffle) OZ_REF="v3.4.2" ;;
            sequence)     OZ_REF="v5.0.0" ;;
            *)            OZ_REF="v5.0.0" ;;
          esac
          forge install --no-commit OpenZeppelin/openzeppelin-contracts@$OZ_REF || true
          forge install --no-commit foundry-rs/forge-std || true
          # sequence/thunder-loan also use OZ upgradeable
          if [ "${{ matrix.corpus }}" = "sequence" ] || [ "${{ matrix.corpus }}" = "thunder-loan" ] || [ "${{ matrix.corpus }}" = "boss-bridge" ]; then
            forge install --no-commit OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.0 || true
          fi
          ls lib/ 2>&1 | head -5

      - name: Run slither on examples/${{ matrix.corpus }}
        run: |
          set +e
          cd examples/${{ matrix.corpus }}
          slither . --solc-disable-warnings 2>&1 | tee slither.txt
          grep -E "result\(s\) found|No contract was analyzed|Error" slither.txt | tail -3
          true

      - name: Upload slither.txt
        uses: actions/upload-artifact@v4
        with:
          name: slither-${{ matrix.corpus }}
          path: examples/${{ matrix.corpus }}/slither.txt
          retention-days: 14
